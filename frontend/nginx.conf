server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: /parser3/* → /parser3/index.html
    location /parser3/ {
        try_files $uri $uri/ /parser3/index.html;
    }

    # Root redirect to /parser3/
    location = / {
        return 302 /parser3/;
    }

    # Proxy API to backend (keep /parser3 prefix — backend uses root_path)
    location /parser3/api/ {
        proxy_pass http://parser3-backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50M;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }

    # Health/docs passthrough (optional, for debugging)
    location /parser3/health {
        proxy_pass http://parser3-backend:8000/health;
        proxy_set_header Host $host;
    }
    location /parser3/docs {
        proxy_pass http://parser3-backend:8000/docs;
        proxy_set_header Host $host;
    }
    location /parser3/openapi.json {
        proxy_pass http://parser3-backend:8000/openapi.json;
        proxy_set_header Host $host;
    }

    # WebSocket
    location /parser3/ws/ {
        proxy_pass http://parser3-backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Cache static
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
