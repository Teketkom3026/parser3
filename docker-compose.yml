version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: parser3-backend
    ports:
      - "8767:8000"
    volumes:
      - ./data:/app/data
      - ./results:/app/results
    environment:
      - ROOT_PATH=/parser3
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: parser3-frontend
    ports:
      - "8768:80"
    depends_on:
      - backend
    restart: unless-stopped
